[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-registry"
version = "0.1.3"
requires-python = ">=3.10"
dependencies = [
    "python-library-tree-model",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["registry"]