[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-tree-model"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "python-library-reactive-model",
    "pydantic>=2.0.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["tree_model"]