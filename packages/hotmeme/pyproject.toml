[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-hotmeme"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["hotmeme"]
