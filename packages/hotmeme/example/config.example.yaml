tikhub:
  enabled: true
  base_url: https://api.tikhub.io
  timeout: 30

pipeline:
  platforms:
    - xiaohongshu

xiaohongshu:
  tags_enabled: false
  search_tags:
    - 搞笑
  page: 1
  sort_type: popularity_descending
  time_filter: 一天内
  note_type: 不限

fetch:
  per_source_timeout: 30
  retries: 1
