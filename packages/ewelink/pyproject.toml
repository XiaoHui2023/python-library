[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ewelink"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "aiohttp",
  "pydantic>=2",
]

[tool.hatch.build.targets.wheel]
packages = ["ewelink"]

[tool.hatch.metadata]
allow-direct-references = true