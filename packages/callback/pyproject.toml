[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-callback"
version = "0.2.1"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "nest-asyncio>=1.6,<2",
    "pydantic>=2.0,<3",
]

[tool.hatch.build.targets.wheel]
packages = ["callback"]