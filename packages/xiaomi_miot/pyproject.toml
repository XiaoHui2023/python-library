[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "xiaomi-miot"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
  "python-miio",
  "pydantic",
]

[tool.hatch.build.targets.wheel]
packages = ["xiaomi_miot"]

[tool.hatch.metadata]
allow-direct-references = true