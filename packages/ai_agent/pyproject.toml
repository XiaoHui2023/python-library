[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-ai-agent"
version = "0.1.4"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0",
    "openai>=1.0",
    "pydantic>=2.0",
    "tzdata>=2024.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "python-dotenv>=1.0"]

[tool.hatch.build.targets.wheel]
packages = ["ai_agent"]
