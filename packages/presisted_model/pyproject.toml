[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-presisted-model"
version = "0.1.2"
description = "Pydantic models with debounced JSON persistence (field assignment triggers save)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
]
keywords = ["pydantic", "persistence", "json", "debounce"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

[tool.hatch.build.targets.wheel]
packages = ["presisted_model"]
