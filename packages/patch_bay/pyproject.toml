[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-patch-bay"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "python-library-express-evaluator==0.1.0",
    "pydantic>=2,<3",
    "aiohttp>=3.9,<4",
    "msgpack>=1,<2",
]

[tool.hatch.build.targets.wheel]
packages = ["patch_bay"]