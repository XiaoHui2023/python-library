[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "watch_config"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "configlib @ git+https://github.com/XiaoHui2023/python-library.git@main#subdirectory=packages/configlib",
]

[tool.hatch.build.targets.wheel]
packages = ["watch_config"]

[tool.hatch.metadata]
allow-direct-references = true