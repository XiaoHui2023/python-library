[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-watch-config"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "python-library-configlib",
]

[tool.hatch.build.targets.wheel]
packages = ["watch_config"]

[tool.hatch.metadata]
allow-direct-references = true