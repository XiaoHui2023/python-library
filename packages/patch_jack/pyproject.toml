[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-patch-jack"
version = "0.1.1"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2,<3",
    "aiohttp>=3.9,<4",
    "msgpack>=1,<2",
]

[project.optional-dependencies]
rich = ["rich>=13"]
integration = ["python-library-patch-bay==0.1.8"]

[tool.hatch.build.targets.wheel]
packages = ["patch_jack"]
