[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-qq-adapter"
version = "0.1.2"
description = "QQ 开放平台正文与 OneBot 载荷互转及接入"
requires-python = ">=3.10"
dependencies = [
    "aiohttp",
    "python-library-onebot-protocol==0.2.0",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["qq_adapter"]
