[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-lagrange-adapter"
version = "0.1.1"
description = "Lagrange / aiocqhttp CQ 消息段与 OneBot 载荷互转及接入"
requires-python = ">=3.10"
dependencies = [
    "aiocqhttp",
    "pydantic>=2.0,<3",
    "python-library-onebot-protocol",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["lagrange_adapter"]
