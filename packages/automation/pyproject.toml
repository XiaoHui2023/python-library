[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-automation"
version = "0.1.16"
requires-python = ">=3.10"
dependencies = [
    "python-library-registry",
    "python-library-scheduler",
    "python-library-watch-config",
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["automation"]