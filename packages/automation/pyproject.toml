[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "automation"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "registry @ git+https://github.com/XiaoHui2023/python-library.git@main#subdirectory=packages/registry",
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["automation"]

[tool.hatch.metadata]
allow-direct-references = true