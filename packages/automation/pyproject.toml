[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-automation"
version = "0.3.0"
requires-python = ">=3.10"
dependencies = [
    "python-library-registry",
    "python-library-reactive-model",
    "python-library-observer",
    "python-library-express-evaluator",
]

[tool.hatch.build.targets.wheel]
packages = ["automation"]