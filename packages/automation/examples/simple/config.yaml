events:
  heartbeat:
    type: every
    seconds: 5
    immediate: true

actions:
  greet:
    params:
      message: str
    conditions:
      - "{action.local.message} != ''"
    actions:
      - type: log
        info: "[greet] {action.local.message}"

triggers:
  heartbeat_flow:
    event: heartbeat
    actions:
      - type: log
        info: "heartbeat fired, start waiting"
      - type: delay
        seconds: 2
      - type: log
        info: "delay finished"
      - type: greet
        message: "hello from composite action"