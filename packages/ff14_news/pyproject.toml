[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "python-library-ff14-news"
version = "0.0.6"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "crawl4weibo>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "rich>=13"]
example = ["textual-image>=0.7"]

[tool.hatch.build.targets.wheel]
packages = ["ff14_news"]
