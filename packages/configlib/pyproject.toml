[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "configlib"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
    "json5>=0.9.0",
    "PyYAML>=6.0.0",
    "tomli>=2.0.0; python_version < '3.11'",
]

[tool.hatch.build.targets.wheel]
packages = ["configlib"]